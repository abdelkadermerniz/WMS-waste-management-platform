version: "3.9"

networks:
  wm-network:
    driver: bridge

volumes:
  mysql-data:

services:
  # ─────────────────────────────────────────────
  # MySQL 8.0 Database
  # ─────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: wm-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${DB_NAME:-waste_management_db}
      MYSQL_USER: ${DB_USER:-wm_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-wm_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - wm-network
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "${DB_USER:-wm_user}",
          "-p${DB_PASSWORD:-wm_password}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─────────────────────────────────────────────
  # Adminer - DB Management UI
  # ─────────────────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: wm-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
    networks:
      - wm-network
    depends_on:
      db:
        condition: service_healthy

  # ─────────────────────────────────────────────
  # Express API
  # ─────────────────────────────────────────────
  api:
    build:
      context: ./apps/express-api
      dockerfile: Dockerfile
      target: development
    container_name: wm-api
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3001}
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-waste_management_db}
      DB_USER: ${DB_USER:-wm_user}
      DB_PASSWORD: ${DB_PASSWORD:-wm_password}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-admin@wm-platform.com}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:-Admin@1234!}
    ports:
      - "${PORT:-3001}:3001"
    volumes:
      - ./apps/express-api/src:/app/src
    networks:
      - wm-network
    depends_on:
      db:
        condition: service_healthy

  # ─────────────────────────────────────────────
  # Next.js Admin Dashboard
  # ─────────────────────────────────────────────
  admin-dashboard:
    build:
      context: ./apps/next-backoffice
      dockerfile: Dockerfile
      target: development
    container_name: wm-dashboard
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      NEXT_PUBLIC_API_URL: http://api:3001/api
    ports:
      - "3000:3000"
    volumes:
      - ./apps/next-backoffice/src:/app/src
    networks:
      - wm-network
    depends_on:
      - api
